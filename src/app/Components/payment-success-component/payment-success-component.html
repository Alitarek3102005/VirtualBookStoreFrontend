<!-- Ambient Animated Background -->
<div class="ambient-background">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
</div>

<main class="success-viewport">
  <div class="premium-glass-card">
    
    <!-- Glowing Icon -->
    <div class="icon-glow-wrapper">
      <div class="pulse-ring"></div>
      <div class="icon-inner">
        <svg class="success-svg" viewBox="0 0 52 52">
          <circle class="svg-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="svg-check-path" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>
    </div>

    <!-- Elegant Typography -->
    <div class="message-content">
      <h1 class="reveal-item gradient-text">Payment Confirmed</h1>
      <p class="reveal-item sub-text">Your transaction was successful. The requested volumes have been added to your secure library.</p>
    </div>

    <!-- Premium Button -->
    <div class="action-footer reveal-item">
      <button class="btn-premium" (click)="continueBrowsing()">
        <span class="btn-text">Enter Library</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>

  </div>
</main>
